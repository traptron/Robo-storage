# Конфигурация ros2_control для робо-тележки
controller_manager:
  ros__parameters:
    update_rate: 50  # Hz

    # Контроллер дифференциального привода
    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    # Контроллер broadcaster для состояния суставов
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

# Параметры дифференциального привода
diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]

    wheel_separation: 0.35  # Расстояние между колесами (м)
    wheel_radius: 0.065     # Радиус колеса (м)

    # Ограничения
    linear:
      x:
        has_velocity_limits: true
        max_velocity: 0.5  # м/с
        has_acceleration_limits: true
        max_acceleration: 0.8  # м/с²

    angular:
      z:
        has_velocity_limits: true
        max_velocity: 1.5  # рад/с
        has_acceleration_limits: true
        max_acceleration: 2.0  # рад/с²

    # Публикация одометрии
    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_link
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    # TF
    enable_odom_tf: true

    # Команды
    cmd_vel_timeout: 0.5  # секунды

joint_state_broadcaster:
  ros__parameters:
    publish_rate: 50.0
